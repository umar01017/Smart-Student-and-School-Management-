{% extends "base.html" %}

{% block content %}
<div class="container-fluid vh-100 d-flex justify-content-center align-items-center auth-bg">
    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 400px; backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.9);">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-inline-flex justify-content-center align-items-center mb-3" style="width: 60px; height: 60px;">
                    <i class="fas fa-graduation-cap fs-3"></i>
                </div>
                <h3 class="fw-bold text-dark">Welcome Back</h3>
                <p class="text-muted">Smart Student Management System</p>
            </div>
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                    <label for="email"><i class="fas fa-envelope text-muted me-2"></i>Email address</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    <label for="password"><i class="fas fa-lock text-muted me-2"></i>Password</label>
                </div>
                <button class="btn btn-primary w-100 py-2 fs-5 fw-semibold rounded-3 shadow-sm mb-3" type="submit">Log In</button>
            </form>
            
            <div class="text-center">
                <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('register') }}" class="text-primary fw-bold text-decoration-none">Register</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
