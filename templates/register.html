{% extends "base.html" %}

{% block content %}
<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center auth-bg py-5">
    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 450px; backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.9);">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="bg-success text-white rounded-circle d-inline-flex justify-content-center align-items-center mb-3" style="width: 60px; height: 60px;">
                    <i class="fas fa-user-plus fs-3"></i>
                </div>
                <h3 class="fw-bold text-dark">Create Account</h3>
                <p class="text-muted">Join the platform</p>
            </div>
            
            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                    <label for="username"><i class="fas fa-user text-muted me-2"></i>Full Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                    <label for="email"><i class="fas fa-envelope text-muted me-2"></i>Email address</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="contact" name="contact" placeholder="Contact Number">
                    <label for="contact"><i class="fas fa-phone text-muted me-2"></i>Contact Number</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    <label for="password"><i class="fas fa-lock text-muted me-2"></i>Password</label>
                </div>
                <div class="form-floating mb-4">
                    <select class="form-select" id="role" name="role" aria-label="Role Selection">
                        <option value="student" selected>Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Administrator (For Demo)</option>
                    </select>
                    <label for="role"><i class="fas fa-user-tag text-muted me-2"></i>Account Role</label>
                </div>
                
                <button class="btn btn-success w-100 py-2 fs-5 fw-semibold rounded-3 shadow-sm mb-3" type="submit">Register</button>
            </form>
            
            <div class="text-center">
                <p class="mb-0 text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-success fw-bold text-decoration-none">Log In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
