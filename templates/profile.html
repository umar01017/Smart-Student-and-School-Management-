{% extends "dashboard_base.html" %}

{% block page_title %}My Profile{% endblock %}

{% block dashboard_content %}
<div class="row justify-content-center fade-in">
    <div class="col-lg-8">
        <div class="card dashboard-card border-0 shadow-sm overflow-hidden">
            <!-- Profile Header -->
            <div class="bg-primary p-5 text-center text-white" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                {% if student.picture %}
                <div class="d-inline-flex justify-content-center align-items-center shadow-sm mb-3" style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 3px solid white;">
                    <img src="{{ url_for('static', filename='uploads/' + student.picture) }}" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                {% else %}
                <div class="bg-white rounded-circle d-inline-flex justify-content-center align-items-center shadow-sm mb-3" style="width: 100px; height: 100px;">
                    <span class="text-primary fw-bold" style="font-size: 2.5rem;">{{ student.name[:2].upper() }}</span>
                </div>
                {% endif %}
                <h3 class="fw-bold mb-1">{{ student.name }}</h3>
                <p class="mb-0 text-white-50"><i class="fas fa-graduation-cap me-2"></i>Student</p>
            </div>
            
            <!-- Profile Form -->
            <div class="card-body p-5">
                <form action="{{ url_for('student_profile') }}" method="POST" enctype="multipart/form-data">
                    <h5 class="fw-bold text-dark border-bottom pb-3 mb-4">Personal Information</h5>
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-semibold text-uppercase">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" class="form-control bg-light border-0 form-control-lg" name="name" value="{{ student.name }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-semibold text-uppercase">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control bg-light border-0 form-control-lg" name="email" value="{{ student.email }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-semibold text-uppercase">Roll Number</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-id-card text-muted"></i></span>
                                <input type="text" class="form-control bg-light border-0 form-control-lg" name="roll" value="{{ student.roll }}" placeholder="e.g. CS101">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-semibold text-uppercase">Department</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-building text-muted"></i></span>
                                <input type="text" class="form-control bg-light border-0 form-control-lg" name="department" value="{{ student.department }}" placeholder="e.g. Computer Science">
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-semibold text-uppercase">Contact</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-phone text-muted"></i></span>
                                <input type="text" class="form-control bg-light border-0 form-control-lg" name="contact" value="{{ student.contact }}" placeholder="e.g. +1 234 567 8900">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-semibold text-uppercase">Update Profile Picture</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-image text-muted"></i></span>
                                <input type="file" class="form-control bg-light border-0 form-control-lg" name="picture" accept="image/*">
                            </div>
                        </div>
                        
                        <div class="col-12 mt-5 text-end">
                            <button type="submit" class="btn btn-primary btn-lg px-5 rounded-3 fw-bold shadow-sm">
                                <i class="fas fa-save me-2"></i>Update Profile
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
